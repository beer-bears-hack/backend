databaseChangeLog:
  - changeSet:
      id: 003-session-schema
      author: ko.zimin
      comment: Create session table linked to users with CTE items

      changes:
        - createTable:
            tableName: session
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_session_users
                    references: users(id)
              - column:
                  name: cte_id
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_session_user_id
            tableName: session
            columns:
              - column:
                  name: id

        - createIndex:
            indexName: idx_session_cte_id
            tableName: session
            columns:
              - column:
                  name: cte_id
