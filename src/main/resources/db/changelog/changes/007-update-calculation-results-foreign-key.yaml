databaseChangeLog:
  - changeSet:
      id: 007-update-calculation-results-foreign-key
      author: ko.zimin
      comment: Fix foreign key in calculation_results to reference users table instead of session

      changes:
        - dropForeignKeyConstraint:
            baseTableName: calculation_results
            constraintName: fk_calculation_session

        - renameColumn:
            tableName: calculation_results
            oldColumnName: session_id
            newColumnName: user_id
            columnDataType: uuid

        - addForeignKeyConstraint:
            baseTableName: calculation_results
            baseColumnNames: user_id
            constraintName: fk_calculation_results_users
            referencedTableName: users
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: RESTRICT
            validate: true

        - dropIndex:
            indexName: idx_calculation_session_id
            tableName: calculation_results

        - createIndex:
            indexName: idx_calculation_results_user_id
            tableName: calculation_results
            columns:
              - column:
                  name: user_id

      rollback:
        # Откат: вернуть как было
        - dropForeignKeyConstraint:
            baseTableName: calculation_results
            constraintName: fk_calculation_results_users

        - renameColumn:
            tableName: calculation_results
            oldColumnName: user_id
            newColumnName: session_id
            columnDataType: uuid

        - addForeignKeyConstraint:
            baseTableName: calculation_results
            baseColumnNames: session_id
            constraintName: fk_calculation_session
            referencedTableName: session
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: RESTRICT

        - dropIndex:
            indexName: idx_calculation_results_user_id
            tableName: calculation_results

        - createIndex:
            indexName: idx_calculation_session_id
            tableName: calculation_results
            columns:
              - column:
                  name: session_id