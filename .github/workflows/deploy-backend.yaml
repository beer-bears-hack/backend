name: Deploy Docker Compose

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to rebuild (empty = all)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: [self-hosted]
    
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          
      - name: Deploy
        run: |          
          docker-compose down
          
          export YC_ACCESS_KEY_ID=${{ secrets.YC_ACCESS_KEY_ID }}
          export YC_SECRET_ACCESS_KEY=${{ secrets.YC_SECRET_ACCESS_KEY }}
          export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          export POSTGRES_USER=${{ secrets.POSTGRES_USER }}


          # Build and start
          if [ -n "${{ github.event.inputs.service }}" ]; then
            docker-compose up -d --build ${{ github.event.inputs.service }}
          else
            docker-compose up -d --build
          fi
          
          # Show status
          docker-compose ps
